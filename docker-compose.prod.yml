services:
  # One-shot: applies pending Prisma migrations and seeds the operator
  # user, then exits. App and worker wait for it to complete successfully.
  # Seeding is skipped (not fatal) when SEED_OPERATOR_CHARACTER_ID is unset.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command:
      - sh
      - -c
      - |
        set -e
        npx prisma migrate deploy
        if [ -n "$$SEED_OPERATOR_CHARACTER_ID" ]; then
          npx tsx prisma/seed.ts
        else
          echo "SEED_OPERATOR_CHARACTER_ID not set — skipping operator seed"
        fi
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-fleetr}:${MYSQL_PASSWORD:-fleetr}@db:3306/fleetr
      SEED_OPERATOR_CHARACTER_ID: ${SEED_OPERATOR_CHARACTER_ID:-}
      SEED_OPERATOR_CHARACTER_NAME: ${SEED_OPERATOR_CHARACTER_NAME:-}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-fleetr}:${MYSQL_PASSWORD:-fleetr}@db:3306/fleetr
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_URL: ${APP_URL}
      COOKIE_SECRET: ${COOKIE_SECRET}
      ESI_CLIENT_ID: ${ESI_CLIENT_ID}
      ESI_CLIENT_SECRET: ${ESI_CLIENT_SECRET}
      ESI_CALLBACK_URL: ${ESI_CALLBACK_URL}
      CRON_SECRET: ${CRON_SECRET}
      NEXT_PUBLIC_PARTYKIT_HOST: ${NEXT_PUBLIC_PARTYKIT_HOST}
      PARTYKIT_SECRET: ${PARTYKIT_SECRET}
      PARTYKIT_APP_URL: ${PARTYKIT_APP_URL:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      SOUNDCLOUD_CLIENT_ID: ${SOUNDCLOUD_CLIENT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-fleetr}:${MYSQL_PASSWORD:-fleetr}@db:3306/fleetr
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_URL: ${APP_URL}
      ESI_CLIENT_ID: ${ESI_CLIENT_ID}
      ESI_CLIENT_SECRET: ${ESI_CLIENT_SECRET}
      PARTYKIT_SECRET: ${PARTYKIT_SECRET}
      PARTYKIT_APP_URL: ${PARTYKIT_APP_URL:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: fleetr
      MYSQL_USER: ${MYSQL_USER:-fleetr}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fleetr}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
